#:schema https://developers.openai.com/codex/config-schema.json

# Use stable notify for turn-complete audio; repo-local hooks cover the rest.
notify = [
  "/bin/sh",
  "-lc",
  "AI_HARNESS_AUDIO_DIR=\"$(git rev-parse --show-toplevel)/06_skills/ai-harness/audio\" node \"$(git rev-parse --show-toplevel)/06_skills/ai-harness/claude/hooks/play-sound.mjs\" notify",
]

[features]
codex_hooks = true

[tui]
# Closest built-in Codex equivalent to the Claude custom status line:
# repo / branch / model + 5h / weekly / context usage metrics.
status_line = [
  "project-root",
  "git-branch",
  "model-with-reasoning",
  "five-hour-limit",
  "weekly-limit",
  "context-usage",
]
